<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>おみくじアプリ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎋 おみくじアプリ 🎋</h1>
            <p>今日の運勢を占ってみましょう！</p>
        </header>
        
        <main>
            <div class="omikuji-container">
                <div id="result-display" class="result-display hidden">
                    <div class="result-text" id="result-text"></div>
                </div>
                
                <button id="draw-button" class="draw-button">
                    🎲 おみくじを回す 🎲
                </button>
                
                <div class="instructions">
                    <p>ボタンを押して、今日の運勢を確認してください！</p>
                </div>
            </div>
        </main>
        
        <footer>
            <p>© 2025 おみくじアプリ</p>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
